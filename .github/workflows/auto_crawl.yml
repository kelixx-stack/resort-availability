name: Auto Resort Room Crawl & Publish

on:
  # schedule:
  #   # 한국 시간(KST) 오전 8시, 10시, 12시, 14시, 16시, 18시 작동
  #   # UTC 기준: 전날 23시, 당일 1시, 3시, 5시, 7시, 9시
  #   - cron: '0 23,1,3,5,7,9 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화
  repository_dispatch: # cron-job.org 외부 호출용 트리거
    types: [cron_trigger]

permissions:
  contents: write

jobs:
  crawl-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas openpyxl python-dotenv playwright beautifulsoup4 dateutils selenium webdriver-manager

      - name: Install Playwright Browsers and System Dependencies
        run: |
          npx playwright install --with-deps chromium

      - name: Create Secrets Env File
        run: |
          echo "RESOM_ID=${{ secrets.RESOM_ID }}" >> .env
          echo "RESOM_PW=${{ secrets.RESOM_PW }}" >> .env
          echo "DAEMYUNG_ID=${{ secrets.DAEMYUNG_ID }}" >> .env
          echo "DAEMYUNG_PW=${{ secrets.DAEMYUNG_PW }}" >> .env
          echo "LOTTE_ID=${{ secrets.LOTTE_ID }}" >> .env
          echo "LOTTE_PW=${{ secrets.LOTTE_PW }}" >> .env
          echo "HANHWA_ID=${{ secrets.HANHWA_ID }}" >> .env
          echo "HANHWA_PW=${{ secrets.HANHWA_PW }}" >> .env
          echo "HANHWA_MEMBERSHIP_PW=${{ secrets.HANHWA_MEMBERSHIP_PW }}" >> .env
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> .env
          echo "GITHUB_REPO=${{ github.repository }}" >> .env

      - name: Install OpenVPN & resolved helper
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn openvpn-systemd-resolved

      - name: Fetch and Setup Korea VPN Profile
        run: |
          python -c "
          import urllib.request, base64
          try:
              req = urllib.request.Request('https://www.vpngate.net/api/iphone/', headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=15) as res:
                  data = res.read().decode('utf-8')
              lines = data.split('\n')
              kr = []
              for line in lines:
                  if not line.strip() or line.startswith('*') or line.startswith('#'): continue
                  parts = line.strip().split(',')
                  if len(parts) >= 15 and parts[6] == 'KR':
                      kr.append({
                          'ping': int(parts[3]) if parts[3].isdigit() else 999,
                          'speed': int(parts[4]) if parts[4].isdigit() else 0,
                          'config': parts[14]
                      })
              kr.sort(key=lambda x: (x['ping'], -x['speed']))
              if kr:
                  with open('client.ovpn', 'w') as f:
                      f.write(base64.b64decode(kr[0]['config']).decode('utf-8'))
                      f.write('\nscript-security 2\nup /etc/openvpn/update-systemd-resolved\ndown /etc/openvpn/update-systemd-resolved\ndown-pre\n')
                  print('Success: client.ovpn generated')
              else:
                  print('Error: No Korea VPN found')
                  exit(1)
          except Exception as e:
              print('Error:', e)
              exit(1)
          "

      - name: Connect to Korea VPN
        run: |
          sudo openvpn --config client.ovpn --daemon
          sleep 12
          curl -s https://ipinfo.io/json || true

      - name: Run Resom Resort Crawler
        run: python resom_crawler/resom_crawler.py
        continue-on-error: true

      - name: Run Sono Resort Crawler
        run: python sono_crawler/sono_crawler.py
        continue-on-error: true

      - name: Run Lotte Resort Crawler
        run: python lotte_crawler/lotte_crawler.py
        continue-on-error: true

      - name: Run Hanhwa Resort Crawler
        run: python hanhwa_crawler/hanhwa_crawler.py
        continue-on-error: true

      - name: Aggregate Data to HTML
        run: |
          python convert_to_html.py
          cp resort_availability.html index.html

      - name: Commit and Push Updated Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update resort vacancies [skip ci]"
          branch: main
          file_pattern: 'resom_crawler/data/* sono_crawler/data/* lotte_crawler/data/* hanhwa_crawler/data/* resort_availability.html index.html'
