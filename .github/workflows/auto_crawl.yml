name: Auto Resort Room Crawl & Publish

on:
  # schedule:
  #   # 한국 시간(KST) 오전 8시, 10시, 12시, 14시, 16시, 18시 작동
  #   # UTC 기준: 전날 23시, 당일 1시, 3시, 5시, 7시, 9시
  #   - cron: '0 23,1,3,5,7,9 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화
  repository_dispatch: # cron-job.org 외부 호출용 트리거
    types: [cron_trigger]

permissions:
  contents: write

jobs:
  crawl-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas openpyxl python-dotenv playwright beautifulsoup4 dateutils selenium webdriver-manager

      - name: Install Playwright Browsers and System Dependencies
        run: |
          playwright install --with-deps chromium

      - name: Create Secrets Env File
        run: |
          echo "RESOM_ID=${{ secrets.RESOM_ID }}" >> .env
          echo "RESOM_PW=${{ secrets.RESOM_PW }}" >> .env
          echo "DAEMYUNG_ID=${{ secrets.DAEMYUNG_ID }}" >> .env
          echo "DAEMYUNG_PW=${{ secrets.DAEMYUNG_PW }}" >> .env
          echo "LOTTE_ID=${{ secrets.LOTTE_ID }}" >> .env
          echo "LOTTE_PW=${{ secrets.LOTTE_PW }}" >> .env
          echo "HANHWA_ID=${{ secrets.HANHWA_ID }}" >> .env
          echo "HANHWA_PW=${{ secrets.HANHWA_PW }}" >> .env
          echo "HANHWA_MEMBERSHIP_PW=${{ secrets.HANHWA_MEMBERSHIP_PW }}" >> .env
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> .env
          echo "GITHUB_REPO=${{ github.repository }}" >> .env

      - name: Install OpenVPN & resolved helper
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn openvpn-systemd-resolved

      - name: Fetch and Connect to Korea VPN (with automatic fallback)
        run: |
          python setup_vpn.py

      - name: Run Resom Resort Crawler
        run: python resom_crawler/resom_crawler.py
        continue-on-error: true

      - name: Run Sono Resort Crawler
        run: python sono_crawler/sono_crawler.py
        continue-on-error: true

      - name: Run Lotte Resort Crawler
        run: python lotte_crawler/lotte_crawler.py
        continue-on-error: true

      - name: Run Hanhwa Resort Crawler
        run: python hanhwa_crawler/hanhwa_crawler.py
        continue-on-error: true

      - name: Aggregate Data to HTML
        run: |
          python convert_to_html.py
          cp resort_availability.html index.html

      - name: Generate RAG Optimized Text
        run: |
          python generate_rag_text.py

      - name: Commit and Push Updated Data
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resom_crawler/data/* sono_crawler/data/* lotte_crawler/data/* hanhwa_crawler/data/* resort_availability.html index.html rag_output/* || true
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update resort vacancies and RAG text"
            for i in {1..3}; do
              git pull --rebase origin main && break || sleep 5
            done
            git push origin main
          else
            echo "No changes to commit"
          fi
