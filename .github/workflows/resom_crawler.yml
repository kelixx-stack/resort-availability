name: 리솜 예약현황 크롤러

on:
  schedule:
    # 매일 08:00~18:00 KST (2시간 간격, 6회)
    # KST = UTC+9 이므로 UTC 기준으로 -9시간
    # 08:00 KST = 23:00 UTC (전날)
    # 10:00 KST = 01:00 UTC
    # 12:00 KST = 03:00 UTC
    # 14:00 KST = 05:00 UTC
    # 16:00 KST = 07:00 UTC
    # 18:00 KST = 09:00 UTC
    - cron: '0 23,1,3,5,7,9 * * *'

  # 수동 실행 (테스트용)
  workflow_dispatch:
    inputs:
      debug:
        description: '디버그 모드 (상세 로그)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  crawl:
    name: 리솜 예약현황 수집
    runs-on: ubuntu-latest
    timeout-minutes: 30          # 최대 30분 (행업 방지)

    steps:
      # ── 1. 저장소 체크아웃 ──────────────────────────────
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 1

      # ── 2. Python 환경 설정 ─────────────────────────────
      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 의존성 설치 ──────────────────────────────────
      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Playwright 브라우저 설치 ────────────────────
      - name: Playwright Chromium 설치
        run: playwright install chromium --with-deps

      # ── 5. 크롤러 실행 ──────────────────────────────────
      - name: 리솜 크롤러 실행

        env:
          RESOM_ID:   ${{ secrets.RESOM_ID }}
          RESOM_PW:   ${{ secrets.RESOM_PW }}
          GH_TOKEN:   ${{ secrets.GH_TOKEN }}
          DEBUG_MODE: ${{ github.event.inputs.debug || 'false' }}
        run: |
          echo "실행 시각 (UTC): $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "실행 시각 (KST): $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S')"
          python resom_crawler.py

      # ── 6. 실행 결과 요약 ───────────────────────────────
      - name: 수집 결과 확인
        if: always()
        run: |
          echo "=== data/ 폴더 최신 파일 ==="
          ls -lht data/ | head -10 || echo "data/ 폴더가 비어있거나 없음"
