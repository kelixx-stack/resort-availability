name: 리솜 예약현황 크롤러

on:
  # cron-job.org에서 외부 트리거로 실행
  workflow_dispatch:
    inputs:
      debug:
        description: '디버그 모드 (상세 로그)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  crawl:
    name: 리솜 예약현황 수집
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. 저장소 체크아웃 ──────────────────────────────
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 1

      # ── 2. Python 환경 설정 ─────────────────────────────
      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 의존성 설치 ──────────────────────────────────
      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Playwright 브라우저 설치 ────────────────────
      - name: Playwright Chromium 설치
        run: playwright install chromium --with-deps

      # ── 5. 크롤러 실행 ──────────────────────────────────
      - name: 리솜 크롤러 실행
        env:
          RESOM_ID:   ${{ secrets.RESOM_ID }}
          RESOM_PW:   ${{ secrets.RESOM_PW }}
          GH_TOKEN:   ${{ secrets.GH_TOKEN }}
          DEBUG_MODE: ${{ github.event.inputs.debug || 'false' }}
        run: |
          echo "실행 시각 (UTC): $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "실행 시각 (KST): $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S')"
          python resom_crawler.py

      # ── 6. 실행 결과 요약 ───────────────────────────────
      - name: 수집 결과 확인
        if: always()
        run: |
          echo "=== data/ 폴더 최신 파일 ==="
          ls -lht data/ | head -10 || echo "data/ 폴더가 비어있거나 없음"

      # ── 7. Pages 배포 트리거 ────────────────────────────
      - name: Pages 배포 트리거
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/kelixx-stack/resort-availability/dispatches \
            -d '{"event_type":"rebuild-pages"}'
